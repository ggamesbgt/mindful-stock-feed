<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindful Stock Feed</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Mindful Scrolling</p>
        <h1>Stock Feed</h1>
      </div>
      <button id="resetBtn" class="small-btn">Reset</button>
    </header>

    <section class="intro-card">
      <p>Scroll pelan. Ambil insight, bukan impuls.</p>
      <div class="mix">
        <span>70% ringan</span>
        <span>20% sedang</span>
        <span>10% berat</span>
      </div>
    </section>

    <section id="feed" class="feed"></section>
  </main>

  <nav class="bottom-nav">
    <button class="active">Feed</button>
    <button>Watchlist</button>
    <button>Belajar</button>
    <button>Refleksi</button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
